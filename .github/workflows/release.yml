name: Build and Release

# Runs automatically whenever you publish a new GitHub Release.
# Builds Glance on all three platforms and uploads the installers
# to the release as downloadable assets.

on:
  release:
    types: [created]

permissions:
  contents: write  # needed to upload assets to the release

jobs:
  build:
    strategy:
      fail-fast: false  # if one platform fails, keep building the others
      matrix:
        include:
          - os: macos-14         # Apple Silicon runner (arm64)
            script: pack
            artifact: 'packages/electron/release/Glance-*.dmg'

          - os: windows-latest
            script: pack:win
            artifact: 'packages/electron/release/Glance-Setup-*.exe'

          - os: ubuntu-latest
            script: pack:linux
            artifact: 'packages/electron/release/Glance-*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build all workspaces
        run: npm run build

      - name: Package for ${{ matrix.os }}
        run: npm run ${{ matrix.script }} --workspace=packages/electron

      - name: Upload installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" ${{ matrix.artifact }} --clobber
